<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak | Video Boman</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* --- Gaya Dasar & Tema Klasik Hitam Putih --- */
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            letter-spacing: 1px;
        }

        /* --- Header & Navigasi --- */
        header {
            background-color: #000000;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #111111;
        }
        header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 25px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }
        nav a:hover { color: #888888; }

        /* --- Konten Halaman Kontak --- */
        .main-content {
            padding: 80px 20px;
            max-width: 600px;
            margin: auto;
            text-align: center;
        }
        .contact-title {
            font-size: 32px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 20px;
        }
        .contact-subtitle {
            font-size: 14px;
            font-weight: 300;
            color: #aaaaaa;
            margin-bottom: 60px;
            letter-spacing: 2px;
        }

        /* --- Form Styling --- */
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .contact-form input, 
        .contact-form textarea {
            background: transparent;
            border: none;
            border-bottom: 1px solid #333333;
            color: #ffffff;
            font-size: 16px;
            padding: 10px 0;
            outline: none;
            transition: border-color 0.3s ease;
            width: 100%;
        }
        .contact-form input:focus, 
        .contact-form textarea:focus {
            border-bottom: 1px solid #ffffff;
        }
        .contact-form textarea {
            resize: vertical;
            min-height: 100px;
        }
        .submit-btn {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 15px;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        .submit-btn:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* --- Footer --- */
        footer {
            background-color: #000000;
            border-top: 1px solid #111111;
            text-align: center;
            padding: 60px 20px;
            margin-top: 80px;
        }
        .footer-socials { margin-bottom: 25px; display: flex; justify-content: center; gap: 40px; }
        .footer-socials a { color: #ffffff; font-size: 24px; text-decoration: none; transition: all 0.3s ease; }
        .footer-socials a:hover { color: #888888; transform: translateY(-3px); }
        .footer-copyright { font-size: 11px; font-weight: 300; color: #444444; letter-spacing: 2px; text-transform: uppercase; margin: 0; }

        /* --- Responsivitas --- */
        @media (max-width: 768px) {
            header { padding: 20px; } 
            header h1 { font-size: 18px; } 
            nav a { margin-left: 15px; font-size: 11px; }
            .contact-title { font-size: 24px; letter-spacing: 4px; }
        }
        @media (max-width: 480px) {
            header { flex-direction: column; gap: 15px; } 
            nav a { margin: 0 10px; }
            .main-content { padding: 40px 20px; }
            .footer-socials { gap: 30px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Video Boman</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="portofolio.html">Portofolio</a>
            <a href="tentang.html">Tentang</a>
            <a href="kontak.html">Kontak</a>
        </nav>
    </header>

    <div class="main-content">
        <h2 class="contact-title">CONTACT.</h2>
        <p class="contact-subtitle">Siap untuk memulai kolaborasi? Kirimkan detail proyek Anda.</p>
        
        <form class="contact-form" action="#" method="POST">
            <input type="text" name="name" placeholder="Nama Lengkap" required>
            <input type="text" name="brand" placeholder="Perusahaan/Brand">
            <input type="email" name="email" placeholder="Alamat Email" required>
            <textarea name="message" placeholder="Ceritakan konsep proyek Anda..." required></textarea>
            <button type="submit" class="submit-btn">KIRIM PESAN</button>
        </form>
    </div>

    <footer>
        <div class="footer-socials">
            <a href="https://www.instagram.com/videoboman" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@jasaeditvideo" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://wa.me/6285171191244" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
        <p class="footer-copyright">&copy; 2026 Video Boman. All Rights Reserved.</p>
    </footer>

</body>
</html>
