<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Video Boman</title>
    <!-- Memuat Icon dari Font Awesome untuk Kebutuhan Footnote -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* --- Gaya Dasar & Tema Klasik Hitam Putih --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden; /* Mengunci layar agar tetap 1 slide penuh tanpa scroll */
        }

        /* --- Header & Navigasi Simetris --- */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            z-index: 10;
        }
        header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 25px;
            font-size: 14px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }
        nav a:hover {
            color: #888888;
        }

        /* --- Hero Section (Tampilan Visual Utama 1 Slide) --- */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* --- Video Latar Belakang Tetap Pertahankan --- */
        .hero-video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: grayscale(100%) brightness(40%); /* Gelap dan monokrom agar estetik */
        }

        /* Konten Utama di Tengah Layar */
        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 0 20px;
        }

        /* Tombol Utama Tetap Ada */
        .cta-button {
            display: inline-block;
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .cta-button:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* --- Footnote Sosial Media di Bagian Bawah --- */
        footer {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        .footer-socials {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 15px;
        }
        .footer-socials a {
            color: #ffffff;
            font-size: 20px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .footer-socials a:hover {
            color: #888888;
        }
        .footer-copyright {
            font-size: 10px;
            color: #555555;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
        }

        /* --- Pengaturan Responsive --- */
        @media (max-width: 768px) {
            header { padding: 20px; }
            header h1 { font-size: 18px; }
            nav a { margin-left: 15px; font-size: 12px; }
        }

        @media (max-width: 480px) {
            header { flex-direction: column; gap: 12px; padding: 20px 10px; }
            nav a { margin: 0 8px; font-size: 11px; }
            .cta-button { padding: 12px 30px; font-size: 11px; }
            .footer-socials { gap: 30px; }
        }
    </style>
</head>
<body>

    <!-- Header / Navigasi Atas -->
    <header>
        <h1>Video Boman</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="portofolio.html">Portofolio</a>
            <a href="tentang.html">Tentang</a>
            <a href="kontak.html">Kontak</a>
        </nav>
    </header>

    <!-- Rumpun Utama Layar Home -->
    <main class="hero-section">
        <!-- VIDEO BACKROUND PLACEMENT (Tetap Aktif) -->
        <video class="hero-video-bg" autoplay loop muted playsinline>
            <source src="video.mp4" type="video/mp4">
            <!-- Fallback video jika file lokal belum di-load -->
            <source src="https://assets.mixkit.co/videos/preview/mixkit-set-of-dynamic-cinematic-video-cuts-41145-large.mp4" type="video/mp4">
        </video>

        <!-- KONTEN TENGAH: Hanya menyisakan tombol tanpa tulisan kotak melayang dari image_472dbb.png -->
        <div class="hero-content">
            <a href="portofolio.html" class="cta-button">View Portfolio</a>
        </div>
    </main>

    <!-- Footnote Media Sosial -->
    <footer>
        <div class="footer-socials">
            <a href="https://www.instagram.com/videoboman" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@jasaeditvideo" target="_blank" title="TikTok"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://wa.me/6285171191244" target="_blank" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
        <p class="footer-copyright">&copy; 2026 Video Boman. All Rights Reserved.</p>
    </footer>

</body>
</html>
